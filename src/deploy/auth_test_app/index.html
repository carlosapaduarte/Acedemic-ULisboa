<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Autenticação SAML</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #491351; color: white; }
        .container { text-align: center; padding: 2rem; }
        h1 { margin-bottom: 2rem; }
        a {
            display: inline-block;
            padding: 15px 25px;
            font-size: 20px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            outline: none;
            color: #000;
            background-color: #7df4be;
            border: none;
            border-radius: 15px;
            box-shadow: 0 7px #592e25;
            font-weight: bold;
            transition: all 0.1s ease-in-out;
        }
        a:hover { background-color: #6cddab }
        a:active {
            background-color: #5cbf9a;
            box-shadow: 0 4px #592e25;
            transform: translateY(3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Teste de Autenticação com a ULisboa</h1>
        <a href="lisbon/saml/login">Login com a ULisboa</a>
    </div>
</body>
</html>
